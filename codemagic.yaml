workflows:
  ios_adhoc_build:
    name: Grid Crown iOS AdHoc Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      cocoapods: default
      node: 20
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: "com.ozgur72.gridcrownblockblast"
      vars:
        BUNDLE_ID: "com.ozgur72.gridcrownblockblast"
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
        ADMOB_IOS_APP_ID: "ca-app-pub-4788652923724034~5337780715"

    scripts:
      - name: Install npm dependencies
        script: |
          npm ci

      - name: Build web assets
        script: |
          npm run build:web

      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios

      - name: Ensure AdMob plist key
        script: |
          /usr/libexec/PlistBuddy -c "Set :GADApplicationIdentifier $ADMOB_IOS_APP_ID" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string $ADMOB_IOS_APP_ID" ios/App/App/Info.plist

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          cd ../..

      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

  ios_appstore_build:
    name: Grid Crown iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic

    environment:
      xcode: latest
      cocoapods: default
      node: 20
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.ozgur72.gridcrownblockblast"
      vars:
        BUNDLE_ID: "com.ozgur72.gridcrownblockblast"
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
        ADMOB_IOS_APP_ID: "ca-app-pub-4788652923724034~5337780715"

    scripts:
      - name: Install npm dependencies
        script: |
          npm ci

      - name: Force production AdMob mode for App Store build
        script: |
          node -e "const fs=require('fs');const p='src/main.js';let s=fs.readFileSync(p,'utf8');const from='const ADMOB_USE_TEST_ADS = true;';const to='const ADMOB_USE_TEST_ADS = false;';if(!s.includes(from)&&!s.includes(to)){throw new Error('ADMOB flag not found in src/main.js');}s=s.replace(from,to);fs.writeFileSync(p,s);"

      - name: Build web assets
        script: |
          npm run build:web

      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios

      - name: Ensure AdMob plist key
        script: |
          /usr/libexec/PlistBuddy -c "Set :GADApplicationIdentifier $ADMOB_IOS_APP_ID" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string $ADMOB_IOS_APP_ID" ios/App/App/Info.plist

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          cd ../..

      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
